<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokdan</title>
    <link rel="icon" type="image/png" href="/aa.PNG">
    
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <h1>מערכת מוקדן </h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="מי מתקשר?">
        <div id="autocompleteList" class="autocomplete-list"></div>
    </div>

    <div id="detailsCard" class="details-card">
        <h3 id="cardTitle">פרטי עובד ומחשב</h3>
        <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px;">
            <div class="info-group" style="display: none;"><div class="info-label">שם מלא</div><div class="info-value" id="resName"></div></div>
            <div class="info-group" id="sapGroup"><div class="info-label">זיהוי סאפ</div><div class="info-value" id="sapId"></div></div>
            <div class="info-group" id="networkGroup"><div class="info-label">שם משתמש </div><div class="info-value" id="networkId"></div></div>
            <div class="info-group" id="idGroup"><div class="info-label"> תעודת זהות</div><div class="info-value" id="resId"></div></div>
            <div class="info-group"><div class="info-label"> סוג עובד</div><div class="info-value" id="emp" ></div></div>
            <div class="info-group"><div class="info-label">מחלקה</div><div class="info-value" id="resDept"></div></div>
            <div class="info-group"><div class="info-label">טלפון</div><div class="info-value" id="resPhone"></div></div>
            <div class="info-group"><div class="info-label">מחשב מחובר</div><div class="info-value" id="resComp"></div></div>
            <div class="info-group"><div class="info-label">כתובת IP</div><div class="info-value" id="resIP"></div></div>
            <div class="info-group"><div class="info-label">מערכת הפעלה</div><div class="info-value" id="resOS"></div></div>
            <div class="info-group"><div class="info-label">שעת התחברות</div><div class="info-value" id="resLoginTime"></div></div>
            <div class="info-group"><div class="info-label">סטטוס</div><div class="info-value" id="resHrStatus"></div></div>
        </div>

        <div class="btn-group">
            <button class="btn-action" onclick="alert('ממתין ללידור')">אימות פרטים</button>
            <button class="btn-action" id="btnPrinters">מדפסות </button>
            <button class="btn-remote" id="btnRemote"> השתלטות </button>
        </div>
    </div>
</div>

<script src="/script.js"></script>
</body>
</html>
